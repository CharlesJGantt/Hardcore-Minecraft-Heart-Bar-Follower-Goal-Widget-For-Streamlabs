<!-- Main wrapper for the follower goal widget -->
<div class="goal-wrap">

  <!-- Fixed-width widget container -->
  <div class="minecraft-goal">

    <!-- Top row: title on the left, follower count on the right -->
    <div class="goal-header">
      <span id="goal-title"></span>

      <span>
        <span id="current-amount"></span> /
        <span id="target-amount"></span>
      </span>
    </div>

    <!-- JavaScript will dynamically insert the hearts here -->
    <div id="heart-bar" class="heart-bar"></div>

  </div>
</div>
